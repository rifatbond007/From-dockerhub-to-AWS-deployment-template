name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop, staging ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_REPO: ${{ secrets.DOCKER_HUB_REPO }}

jobs:
  # ──────────────────────────────────────────────
  # 1. TEST (all branches & PRs)
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run type check
        run: npm run typecheck

  # ──────────────────────────────────────────────
  # 2. BUILD & PUSH (develop / staging / main)
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Set Docker repo name (lowercase)
        if: env.DOCKER_HUB_REPO == ''
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "DOCKER_HUB_REPO=${REPO,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 3. DEPLOY — DEV
  # ──────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment:
      name: dev
      url: http://18.141.170.37:3000
    steps:
      - name: Set Docker repo name (lowercase)
        if: env.DOCKER_HUB_REPO == ''
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "DOCKER_HUB_REPO=${REPO,,}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            IMAGE="${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:sha-${{ github.sha }}"
            CONTAINER="${{ env.DOCKER_HUB_REPO }}"

            # Save previous image for rollback
            PREV_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$CONTAINER" 2>/dev/null || echo "")

            echo "Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping old container..."
            docker container inspect "$CONTAINER" >/dev/null 2>&1 && \
              docker stop "$CONTAINER" && \
              docker rm "$CONTAINER" || true

            echo "Starting new container..."
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 3000:3000 \
              "$IMAGE"

            echo "Running health check..."
            sleep 5
            HTTP_CODE=$(docker run --rm --network host curlimages/curl:8.7.1 -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "! Health check FAILED (HTTP $HTTP_CODE). Rolling back..."
              docker stop "$CONTAINER" && docker rm "$CONTAINER" || true
              if [ -n "$PREV_IMAGE" ]; then
                echo "Restoring previous image: $PREV_IMAGE"
                docker pull "$PREV_IMAGE"
                docker run -d \
                  --name "$CONTAINER" \
                  --restart unless-stopped \
                  -p 3000:3000 \
                  "$PREV_IMAGE"
                echo "Rolled back to: $PREV_IMAGE"
              else
                echo "No previous image to roll back to. Container stopped."
              fi
              exit 1
            fi

            echo "Health check passed!"

            docker image prune -af --filter "until=24h"

            echo "Deployment to dev complete!"

  # ──────────────────────────────────────────────
  # 4. DEPLOY — STAGING
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: http://staging.example.com
    steps:
      - name: Set Docker repo name (lowercase)
        if: env.DOCKER_HUB_REPO == ''
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "DOCKER_HUB_REPO=${REPO,,}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            IMAGE="${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:sha-${{ github.sha }}"
            CONTAINER="${{ env.DOCKER_HUB_REPO }}"

            PREV_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$CONTAINER" 2>/dev/null || echo "")

            echo "Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping old container..."
            docker container inspect "$CONTAINER" >/dev/null 2>&1 && \
              docker stop "$CONTAINER" && \
              docker rm "$CONTAINER" || true

            echo "Starting new container..."
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 3000:3000 \
              "$IMAGE"

            echo "Running health check..."
            sleep 5
            HTTP_CODE=$(docker run --rm --network host curlimages/curl:8.7.1 -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "! Health check FAILED (HTTP $HTTP_CODE). Rolling back..."
              docker stop "$CONTAINER" && docker rm "$CONTAINER" || true
              if [ -n "$PREV_IMAGE" ]; then
                echo "Restoring previous image: $PREV_IMAGE"
                docker pull "$PREV_IMAGE"
                docker run -d \
                  --name "$CONTAINER" \
                  --restart unless-stopped \
                  -p 3000:3000 \
                  "$PREV_IMAGE"
                echo "Rolled back to: $PREV_IMAGE"
              else
                echo "No previous image to roll back to. Container stopped."
              fi
              exit 1
            fi

            echo "Health check passed!"

            docker image prune -af --filter "until=24h"

            echo "Deployment to staging complete!"

  # ──────────────────────────────────────────────
  # 5. DEPLOY — PRODUCTION  (requires manual approval)
  # ──────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: http://production.example.com
    steps:
      - name: Set Docker repo name (lowercase)
        if: env.DOCKER_HUB_REPO == ''
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "DOCKER_HUB_REPO=${REPO,,}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            IMAGE="${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:sha-${{ github.sha }}"
            CONTAINER="${{ env.DOCKER_HUB_REPO }}"

            PREV_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$CONTAINER" 2>/dev/null || echo "")

            echo "Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping old container..."
            docker container inspect "$CONTAINER" >/dev/null 2>&1 && \
              docker stop "$CONTAINER" && \
              docker rm "$CONTAINER" || true

            echo "Starting new container..."
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 3000:3000 \
              "$IMAGE"

            echo "Running health check..."
            sleep 5
            HTTP_CODE=$(docker run --rm --network host curlimages/curl:8.7.1 -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "! Health check FAILED (HTTP $HTTP_CODE). Rolling back..."
              docker stop "$CONTAINER" && docker rm "$CONTAINER" || true
              if [ -n "$PREV_IMAGE" ]; then
                echo "Restoring previous image: $PREV_IMAGE"
                docker pull "$PREV_IMAGE"
                docker run -d \
                  --name "$CONTAINER" \
                  --restart unless-stopped \
                  -p 3000:3000 \
                  "$PREV_IMAGE"
                echo "Rolled back to: $PREV_IMAGE"
              else
                echo "No previous image to roll back to. Container stopped."
              fi
              exit 1
            fi

            echo "Health check passed!"

            docker image prune -af --filter "until=24h"

            echo "Deployment to production complete!"
